name: Reusable CI - Node

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "20"
      working-directory:
        required: false
        type: string
        default: "."
      package-manager:
        required: false
        type: string
        default: "npm"

jobs:
  lint-and-test:
    name: Lint & Test (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Lint
        run: ${{ inputs.package-manager }} run lint --if-present

      - name: Build
        run: ${{ inputs.package-manager }} run build --if-present

      - name: Test
        run: ${{ inputs.package-manager }} test --if-present
