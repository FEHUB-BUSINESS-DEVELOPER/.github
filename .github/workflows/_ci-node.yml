name: Reusable CI - Node

# Reusable workflow para repos Node (npm/pnpm/yarn autodetect via lockfile).
# Corre install + lint + test + build cuando los scripts existen en package.json.
# Si un script no existe, no falla.
#
# Uso:
#   jobs:
#     ci:
#       uses: FEHUB-BUSINESS-DEVELOPER/.github/.github/workflows/_ci-node.yml@main
#       with:
#         node-version: "20"

on:
  workflow_call:
    inputs:
      node-version:
        description: "Versión de Node"
        type: string
        default: "20"

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint (si script existe)
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run lint --if-present || echo "::notice::sin script lint"
          elif [ -f yarn.lock ]; then
            yarn run lint || echo "::notice::sin script lint"
          else
            npm run lint --if-present || echo "::notice::sin script lint"
          fi

      - name: Test (si script existe)
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run test --if-present || echo "::notice::sin script test"
          elif [ -f yarn.lock ]; then
            yarn test || echo "::notice::sin script test"
          else
            npm test --if-present || echo "::notice::sin script test"
          fi

      - name: Build (si script existe)
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run build --if-present || echo "::notice::sin script build"
          elif [ -f yarn.lock ]; then
            yarn run build || echo "::notice::sin script build"
          else
            npm run build --if-present || echo "::notice::sin script build"
          fi
