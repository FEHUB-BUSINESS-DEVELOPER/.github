name: Reusable CI - Python

# Reusable workflow para repos Python.
# Detecta pyproject.toml o requirements.txt para instalar.
# Lint con ruff. Tests con pytest si hay tests.
#
# Uso:
#   jobs:
#     ci:
#       uses: FEHUB-BUSINESS-DEVELOPER/.github/.github/workflows/_ci-python.yml@main
#       with:
#         python-version: "3.11"

on:
  workflow_call:
    inputs:
      python-version:
        description: "Versión de Python"
        type: string
        default: "3.11"

jobs:
  build-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e . || pip install .
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install ruff pytest

      - name: Lint (ruff)
        shell: bash
        run: |
          ruff check . || echo "::warning::Ruff encontró issues — no falla el job todavía"

      - name: Test (pytest si hay tests)
        shell: bash
        run: |
          if find . -path ./.venv -prune -o \( -name "test_*.py" -o -name "*_test.py" \) -print | grep -q .; then
            set +e
            pytest -v
            rc=$?
            if [ $rc -eq 5 ]; then
              echo "::notice::pytest no recolectó tests (exit 5) — tratado como OK"
              exit 0
            fi
            exit $rc
          else
            echo "::notice::No se encontraron tests — omitido"
          fi
